<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Indah Untukmu</title>
    <style>
        /* 1. Mengatur Latar Belakang Halaman */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. Mengatur Kotak Utama (Card) */
        .card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2d3748;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 12px;
        }

        p {
            color: #718096;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* 3. Mendesain Tombol */
        button {
            background-color: #4a5568;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: #2d3748;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 4. Menyembunyikan Elemen */
        .tersembunyi {
            display: none !important;
        }

        /* 5. Mendesain Teks Indah */
        #pesan-indah {
            color: #2b6cb0;
            font-style: italic;
            font-weight: 500;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 25px;
            margin-bottom: 0;
            padding: 15px;
            background-color: #ebf8ff;
            border-radius: 12px;
            border-left: 4px solid #3182ce;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Halo, Selamat Datang! ✨</h1>
        <p>Ada sebuah pesan khusus yang ditulis di bawah ini hanya untukmu.</p>
        
        <button onclick="tampilkanPesan()">Klik untuk Membuka Pesan Indah</button>
        
        <div id="pesan-indah" class="tersembunyi"></div>
    </div>

    <script>
        function tampilkanPesan() {
            const elemenPesan = document.getElementById("pesan-indah");
            const tombol = document.querySelector("button");
            const kataIndah = "Hari ini adalah hari yang baik untuk memulai sesuatu yang luar biasa. Tetap semangat, jaga kesehatan, dan jangan lupa tersenyum! 🌟✨";
            
            if (elemenPesan.classList.contains("tersembunyi")) {
                elemenPesan.classList.remove("tersembunyi");
                elemenPesan.innerHTML = ""; 
                
                tombol.innerHTML = "✨ Pesan Berhasil Dibuka ✨";
                tombol.style.backgroundColor = "#3182ce"; 
                
                let index = 0;
                function ketikTeks() {
                    if (index < kataIndah.length) {
                        elemenPesan.innerHTML += kataIndah.charAt(index);
                        index++;
                        setTimeout(ketikTeks, 40); 
                    }
                }
                ketikTeks();
                
            } else {
                elemenPesan.classList.add("tersembunyi");
                elemenPesan.innerHTML = "";
                tombol.innerHTML = "Klik untuk Membuka Pesan Indah";
                tombol.style.backgroundColor = "#4a5568"; 
            }
        }
    </script>
</body>
</html>
